let masked = false;

function maskPhone(phone) {
  const digits = phone.replace(/\D/g, '');
  if (digits.length < 7) return phone;
  return phone.replace(/(\d{2,3})[- ]?(\d{3,4})[- ]?(\d{4})/, '$1-****-$3');
}

function render() {
  const q = document.getElementById('q').value.trim().toLowerCase().replace(/[^0-9a-z가-힣]/g,'');
  const tbody = document.getElementById('rows');
  const filtered = !q ? data : data.filter(x => x.search.includes(q));
  tbody.innerHTML = filtered.map(x => `
    <tr>
      <td>${x.name}</td>
      <td><a href="tel:${x.phone}">${masked ? maskPhone(x.phone) : x.phone}</a></td>
      <td>${x.search}</td>
    </tr>
  `).join('');
  document.getElementById('count').textContent = `검색 결과 ${filtered.length}건`;
  document.getElementById('total').textContent = data.length;
}

function exportCSV() {
  const lines = ['이름,전화번호'];
  for (const x of data) lines.push(`"${x.name}","${x.phone}"`);
  const blob = new Blob(["\ufeff" + lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '동기연락처.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function toggleMask() {
  masked = !masked;
  render();
}

document.getElementById('q').addEventListener('input', render);
render();
